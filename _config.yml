# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: "Yiwei Jackson Chen"
subtitle: "PhD student at CSE, HKUST | Machine Learning & Computer Vision"
email: ychenmb[AT]connect.ust.hk
description: # >- # this means to ignore newlines until "baseurl:"
  Personal website of Yiwei Jackson Chen (陈奕玮), a PhD student at the Hong Kong University of Science and Technology (HKUST). 
  I am interested in machine learning, computer vision, and their applications in solving real-world complex problems, e.g., marine research, biodiversity monitoring, etc. 
  I am currently working on my PhD thesis under the supervision of Prof. Sai-Kit Yeung. In this website, I will share my research work, publications, and other academic activities. 
  Feel free to explore and connect with me!
twitter_username: YiweiJacksonChen
github_username: EvayJacksonChen
minimal_mistakes_skin: default
search: true
# url: "https://yiweichen.org" # the base hostname & protocol for your site. Ex: https://example.com
# baseurl: "" # the subpath of your site, e.g. /blog. If you are not using a subpath, leave this blank.
repository: "EvayJacksonChen/yiwei_personal"
# Build settings
markdown: kramdown
# remote_theme: mmistakes/minimal-mistakes
remote_theme: "mmistakes/minimal-mistakes@4.27.3"
# Outputting
permalink: /:categories/:title/
# paginate: 5 # amount of posts to show
# paginate_path: /page:num/
timezone: "Asia/Hong_Kong" # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages
  - _posts

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-seo-tag

author:
  name   : "Yiwei Chen (陈奕玮)"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "I am a PhD student on machine learning and computer vision at \nthe department of CSE, HKUST."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://yiweichen.org"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:ychenmb[AT]connect.ust.hk"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=1xsk9rYAAAAJ&hl=en&inst=1381320739207392350"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://x.com/_yiweichen"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/yiwei-chen-0a36b2317/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/EvayJacksonChen"
    # - label: "Instagram"
    #   icon: "fab fa-fw fa-instagram"
    #   url: "https://www.instagram.com/evay_chen"

